<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Buddy — Coordination Console</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">⚡ Trade Buddy <span>coordination console</span></div>
    <div class="search">
      <input id="search" type="text" autocomplete="off" spellcheck="false"
             placeholder="Search a stock or index by name or symbol (e.g. apple, SPY, nvidia)…" />
      <ul id="suggestions" class="suggestions"></ul>
    </div>
  </header>

  <!-- TOP: price chart with range tabs -->
  <section class="chart-card">
    <div class="chart-head">
      <div class="quote">
        <span id="quote-symbol">—</span>
        <span id="quote-last"></span>
        <span id="quote-change" class="change"></span>
      </div>
      <div class="chart-toolbar">
        <div class="ind-panel">
          <div class="ind-search-box">
            <svg class="ind-search-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M10 10l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input id="ind-search" type="text" placeholder="Add indicator…" autocomplete="off" spellcheck="false" />
            <ul id="ind-sug" class="ind-sug"></ul>
          </div>
          <div id="active-inds" class="active-inds"></div>
        </div>
        <div class="ranges" id="ranges">
          <button data-range="1d">1D</button>
          <button data-range="5d">5D</button>
          <button data-range="1w">1W</button>
          <button data-range="1m">1M</button>
          <button data-range="3m" class="active">3M</button>
          <button data-range="6m">6M</button>
          <button data-range="ytd">YTD</button>
          <button data-range="1y">1Y</button>
          <button data-range="5y">5Y</button>
          <button data-range="max">MAX</button>
        </div>
      </div>
    </div>
    <div id="tv-chart"></div>
  </section>

  <!-- RUN CONTROLS -->
  <section class="controls">
    <label>Provider
      <select id="provider">
        <option value="deepseek">DeepSeek</option>
        <option value="openrouter">OpenRouter</option>
        <option value="ollama">Ollama</option>
      </select>
    </label>
    <label>Depth
      <select id="depth">
        <option value="1">Shallow</option>
        <option value="3" selected>Medium</option>
        <option value="5">Deep</option>
      </select>
    </label>
    <label>Language
      <select id="language">
        <option value="English" selected>English</option>
        <option value="Simplified Chinese">中文（简体）</option>
        <option value="Traditional Chinese">中文（繁體）</option>
        <option value="French">Français</option>
      </select>
    </label>
    <label class="analysts">Analysts
      <span>
        <label><input type="checkbox" value="market" checked />Technical</label>
        <label><input type="checkbox" value="fundamentals" checked />Fundamentals</label>
        <label><input type="checkbox" value="news" checked />News</label>
        <label><input type="checkbox" value="social" checked />Sentiment</label>
      </span>
    </label>
    <button id="run" disabled>Run analysis</button>
    <span id="status-pill" class="pill">pick a ticker</span>
    <span id="elapsed-pill" class="pill" title="Elapsed time">⏱ 00:00</span>
    <span id="token-pill" class="pill" title="Tokens in / out">⬆ 0 · ⬇ 0</span>
  </section>

  <!-- MAIN: left graph, right output -->
  <main class="main">
    <section class="graph-card">
      <h2>Agent coordination</h2>
      <svg id="graph" viewBox="0 0 840 600" preserveAspectRatio="xMidYMid meet"></svg>
    </section>

    <section class="output-card">
      <h2>Agent output</h2>
      <div id="report-tabs" class="report-tabs"></div>
      <div id="report-view" class="report-view">
        <p class="report-empty">Run an analysis to see each agent's report. Use the tabs above to revisit any analyst.</p>
      </div>

      <div id="debate-panel" class="debate-panel" hidden>
        <div class="debate-head">
          <h3>🥊 Bull vs. Bear debate</h3>
          <span id="debate-status" class="debate-status"></span>
        </div>
        <div id="debate" class="debate"></div>
        <div id="consensus" class="consensus"></div>
      </div>

      <div id="verdict" class="verdict"></div>
      <details class="log-wrap"><summary>Activity log</summary>
        <div id="output" class="output"></div>
      </details>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
